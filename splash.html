<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kathy Designs</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF8C00">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" type="image/png" href="/icons/icon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange:      #FF8C00;
      --orange-dark: #e07b00;
      --orange-glow: rgba(255,140,0,0.3);
      --black:       #1a1a1a;
      --black-deep:  #0d0d0d;
      --white:       #ffffff;
      --cream:       #FFF8F0;
      --amber:       #FFB347;
      --gold:        #FFD700;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black-deep);
    }

    /* ---- SPLASH ---- */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--black-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
    }

    /* Animated diagonal pattern */
    #splash::before {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 50px,
          rgba(255,140,0,0.04) 50px,
          rgba(255,140,0,0.04) 100px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 50px,
          rgba(255,179,71,0.03) 50px,
          rgba(255,179,71,0.03) 100px
        );
      animation: patternDrift 10s linear infinite;
    }

    @keyframes patternDrift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(100px, 100px); }
    }

    /* Orange radial glow */
    #splash::after {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,140,0,0.15) 0%,
        rgba(255,140,0,0.05) 40%,
        transparent 70%
      );
      animation: glowBreath 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowBreath {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.3); opacity: 1; }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
    }

    /* ---- CONTENT ---- */
    .splash-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Rotating rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: ringGrow 1s ease-out forwards, spin linear infinite;
      opacity: 0;
    }

    .ring-1 {
      width: 210px; height: 210px;
      border-width: 1.5px;
      border-color: rgba(255,140,0,0.5);
      animation-delay: 0.2s;
      animation: ringGrow 1s ease-out 0.2s forwards, spin 8s linear infinite;
    }

    .ring-2 {
      width: 255px; height: 255px;
      border-width: 1px;
      border-color: rgba(255,179,71,0.3);
      animation: ringGrow 1s ease-out 0.4s forwards, spin 12s linear infinite reverse;
      opacity: 0;
      animation-delay: 0.4s;
    }

    .ring-3 {
      width: 300px; height: 300px;
      border-width: 0.5px;
      border-color: rgba(255,215,0,0.15);
      animation: ringGrow 1s ease-out 0.6s forwards, spin 18s linear infinite;
      opacity: 0;
      animation-delay: 0.6s;
    }

    @keyframes ringGrow {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Dashed accent ring */
    .ring-dash {
      position: absolute;
      width: 235px; height: 235px;
      border-radius: 50%;
      border: 1px dashed rgba(255,140,0,0.25);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: ringGrow 1s ease-out 0.3s forwards, spin 20s linear infinite reverse;
      opacity: 0;
    }

    /* Logo */
    .splash-logo {
      width: 155px;
      height: 155px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 3;
      opacity: 0;
      transform: scale(0.2) rotate(-15deg);
      animation: logoPop 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.4) 0.6s forwards;
      box-shadow:
        0 0 0 3px var(--orange),
        0 0 30px rgba(255,140,0,0.5),
        0 0 70px rgba(255,140,0,0.25),
        0 25px 50px rgba(0,0,0,0.6);
    }

    @keyframes logoPop {
      0%   { opacity: 0; transform: scale(0.2) rotate(-15deg); }
      70%  { transform: scale(1.08) rotate(3deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Brand name */
    .splash-brand {
      text-align: center;
      margin-top: 2.2rem;
      position: relative;
      z-index: 3;
    }

    .splash-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 9vw, 5rem);
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.03em;
      line-height: 1;
      opacity: 0;
      transform: translateY(35px);
      animation: riseUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
    }

    .splash-name .highlight {
      color: var(--orange);
      font-style: italic;
      text-shadow:
        0 0 40px rgba(255,140,0,0.6),
        0 0 80px rgba(255,140,0,0.3);
    }

    .splash-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      font-weight: 300;
      color: var(--amber);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      animation: riseUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
      margin-top: 0.5rem;
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(35px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .splash-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1.2rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.5s forwards;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange));
    }

    .divider-line.right {
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--orange);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--orange);
    }

    /* Tagline */
    .splash-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.72rem, 2vw, 0.88rem);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.7s forwards;
      margin-top: 0.3rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Loading bar */
    .splash-loader {
      margin-top: 3rem;
      width: 220px;
      opacity: 0;
      animation: fadeIn 0.5s ease 2s forwards;
      position: relative;
      z-index: 3;
    }

    .loader-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: linear-gradient(90deg,
        var(--orange-dark),
        var(--orange),
        var(--amber),
        var(--gold),
        var(--amber),
        var(--orange)
      );
      background-size: 300% 100%;
      animation:
        loadFill 2.2s cubic-bezier(0.4, 0, 0.2, 1) 2.1s forwards,
        shimmerBar 1.5s linear 2.1s infinite;
    }

    @keyframes loadFill {
      0%   { width: 0%; }
      50%  { width: 65%; }
      80%  { width: 88%; }
      100% { width: 100%; }
    }

    @keyframes shimmerBar {
      0%   { background-position: 300% 0; }
      100% { background-position: -300% 0; }
    }

    .loader-label {
      display: flex;
      justify-content: space-between;
      margin-top: 0.6rem;
    }

    .loader-label span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* Orange accent lines top and bottom */
    .accent-top, .accent-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.1s forwards;
      z-index: 3;
    }

    .accent-top {
      top: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--orange-dark) 20%,
        var(--orange) 50%,
        var(--amber) 65%,
        var(--orange) 80%,
        transparent 100%
      );
    }

    .accent-bottom {
      bottom: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--amber) 20%,
        var(--orange) 50%,
        var(--orange-dark) 80%,
        transparent 100%
      );
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 50px; height: 50px;
      z-index: 3;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.3s forwards;
    }

    .c-tl { top: 16px; left: 16px;
      border-top: 2px solid var(--orange);
      border-left: 2px solid var(--orange); }
    .c-tr { top: 16px; right: 16px;
      border-top: 2px solid var(--amber);
      border-right: 2px solid var(--amber); }
    .c-bl { bottom: 16px; left: 16px;
      border-bottom: 2px solid var(--amber);
      border-left: 2px solid var(--amber); }
    .c-br { bottom: 16px; right: 16px;
      border-bottom: 2px solid var(--orange);
      border-right: 2px solid var(--orange); }

    /* Skip hint */
    .skip-hint {
      position: absolute;
      bottom: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 3;
      opacity: 0;
      animation: fadeIn 0.5s ease 3s forwards;
    }

    /* Exit animation */
    #splash.exit {
      animation: splashOut 0.9s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }

    @keyframes splashOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.06); }
    }
  </style>
</head>
<body>

<div id="splash">

  <!-- Accent lines -->
  <div class="accent-top"></div>
  <div class="accent-bottom"></div>

  <!-- Corner brackets -->
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <!-- Main content -->
  <div class="splash-content">

    <!-- Rings around logo -->
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-dash"></div>

    <!-- Logo -->
    <img src="icons/icon-512.png" alt="Kathy Designs" class="splash-logo">

    <!-- Brand -->
    <div class="splash-brand">
      <div class="splash-name"><span class="highlight">Kathy</span> Designs</div>
      <div class="splash-sub">Tema &nbsp;·&nbsp; Ghana</div>
    </div>

    <!-- Divider -->
    <div class="splash-divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line right"></div>
    </div>

    <!-- Tagline -->
    <div class="splash-tagline">African Fashion Redefined</div>

    <!-- Loader -->
    <div class="splash-loader">
      <div class="loader-track">
        <div class="loader-bar"></div>
      </div>
      <div class="loader-label">
        <span>Loading Collection</span>
        <span>Kathy Designs</span>
      </div>
    </div>

  </div>

  <!-- Skip hint -->
  <div class="skip-hint">Tap anywhere to skip</div>

</div>

<script>
  // Generate floating particles in brand colors
  const splash = document.getElementById('splash');
  const colors = [
    'rgba(255,140,0,0.7)',
    'rgba(255,179,71,0.5)',
    'rgba(255,215,0,0.4)',
    'rgba(255,255,255,0.2)',
    'rgba(224,123,0,0.6)'
  ];

  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 8 + 5}s;
      animation-delay: ${Math.random() * 5}s;
      box-shadow: 0 0 ${size * 2}px ${colors[Math.floor(Math.random() * colors.length)]};
    `;
    splash.appendChild(p);
  }

  // Auto dismiss after 4.5 seconds
  let dismissed = false;

  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    splash.classList.add('exit');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 900);
  }

  setTimeout(dismiss, 4500);

  // Tap/click to skip
  splash.addEventListener('click', dismiss);
</script>

</body>
</html>
