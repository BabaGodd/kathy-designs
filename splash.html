<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kathy Designs</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF8C00">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" type="image/png" href="/icons/icon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* ---- BACKGROUND ---- */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: linear-gradient(160deg,
        #fff8f0 0%,
        #fff3e0 30%,
        #ffe8c8 60%,
        #ffd9a0 100%
      );
      overflow: hidden;
    }

    /* Large decorative circles in background */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .bg-circle-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,140,0,0.12) 0%, transparent 70%);
      top: -150px; right: -150px;
      animation: floatCircle 6s ease-in-out infinite;
    }

    .bg-circle-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,140,0,0.08) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      animation: floatCircle 8s ease-in-out infinite reverse;
    }

    .bg-circle-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(255,179,71,0.15) 0%, transparent 70%);
      top: 40%; left: -80px;
      animation: floatCircle 7s ease-in-out infinite 1s;
    }

    @keyframes floatCircle {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    /* Floating dots */
    .dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: dotFloat linear infinite;
      opacity: 0;
    }

    @keyframes dotFloat {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; transform: translateY(80vh) scale(1); }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
    }

    /* ---- MAIN CONTENT ---- */
    .splash-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo container with glowing ring */
    .logo-wrap {
      position: relative;
      margin-bottom: 2rem;
    }

    /* Outer glowing ring */
    .logo-glow-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #FF8C00,
        #FFB347,
        #FFD700,
        #FF8C00,
        #e07b00,
        #FF8C00
      );
      animation: spinRing 3s linear infinite;
      z-index: 0;
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* White gap between ring and logo */
    .logo-glow-ring::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #fff8f0;
    }

    /* Logo image */
    .splash-logo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: scale(0.5);
      animation: logoBounce 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.4) 0.3s forwards;
      box-shadow: 0 20px 60px rgba(255,140,0,0.3);
    }

    @keyframes logoBounce {
      0%   { opacity: 0; transform: scale(0.5); }
      70%  { transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Sparkles around logo */
    .sparkle {
      position: absolute;
      pointer-events: none;
      animation: sparkleAnim ease-in-out infinite;
      opacity: 0;
    }

    .sparkle::before {
      content: '✦';
      color: #FF8C00;
      font-size: inherit;
    }

    @keyframes sparkleAnim {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50%       { opacity: 1; transform: scale(1) rotate(180deg); }
    }

    /* Brand name */
    .splash-brand {
      text-align: center;
      opacity: 0;
      transform: translateY(25px);
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .brand-name .highlight {
      color: #FF8C00;
      font-style: italic;
    }

    .brand-tagline {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(0.75rem, 2vw, 0.92rem);
      font-weight: 300;
      color: #888;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* Divider with diamonds */
    .splash-divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 1.2rem 0;
      opacity: 0;
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
    }

    .divider-line {
      width: 50px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #FF8C00);
    }

    .divider-line.right {
      background: linear-gradient(90deg, #FF8C00, transparent);
    }

    .divider-dot {
      width: 6px; height: 6px;
      background: #FF8C00;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,140,0,0.5);
    }

    /* Location tag */
    .splash-location {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: white;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: #FF8C00;
      box-shadow: 0 4px 16px rgba(255,140,0,0.15);
      border: 1px solid rgba(255,140,0,0.2);
      opacity: 0;
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
    }

    .splash-location::before {
      content: '📍';
      font-size: 0.85rem;
    }

    /* Loading dots */
    .splash-loader {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.8s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .loader-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #FF8C00;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .loader-dot:nth-child(1) { animation-delay: 0s; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; background: #FFB347; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; background: #FFD700; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0) scale(1); }
      30%            { transform: translateY(-12px) scale(1.2); }
    }

    /* Loading text */
    .loader-text {
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      color: #bbb;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-left: 0.5rem;
    }

    /* Skip hint */
    .skip-hint {
      position: absolute;
      bottom: 2rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.5s ease 3s forwards;
    }

    /* Decorative wave at bottom */
    .splash-wave {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      opacity: 0.4;
    }

    /* Exit animation */
    #splash.exit {
      animation: splashExit 0.7s ease forwards;
    }

    @keyframes splashExit {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.04); }
    }
  </style>
</head>
<body>

<div id="splash">

  <!-- Background circles -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>

  <!-- Decorative wave -->
  <svg class="splash-wave" viewBox="0 0 1440 120" preserveAspectRatio="none">
    <path d="M0,60 C360,120 1080,0 1440,60 L1440,120 L0,120 Z"
          fill="rgba(255,140,0,0.08)"/>
    <path d="M0,80 C480,20 960,100 1440,40 L1440,120 L0,120 Z"
          fill="rgba(255,140,0,0.05)"/>
  </svg>

  <!-- Main content -->
  <div class="splash-content">

    <!-- Logo with spinning ring -->
    <div class="logo-wrap">
      <div class="logo-glow-ring"></div>

      <!-- Sparkles -->
      <div class="sparkle" style="top:-20px;right:10px;font-size:1rem;animation-duration:2s;animation-delay:1.2s;"></div>
      <div class="sparkle" style="bottom:-15px;left:5px;font-size:0.7rem;animation-duration:2.5s;animation-delay:1.6s;"></div>
      <div class="sparkle" style="top:10px;left:-20px;font-size:0.8rem;animation-duration:2.2s;animation-delay:2s;"></div>
      <div class="sparkle" style="bottom:20px;right:-18px;font-size:0.6rem;animation-duration:1.8s;animation-delay:1.4s;"></div>

      <img src="icons/icon-512.png" alt="Kathy Designs" class="splash-logo">
    </div>

    <!-- Brand -->
    <div class="splash-brand">
      <div class="brand-name"><span class="highlight">Kathy</span> Designs</div>
      <div class="brand-tagline">Premium African Fashion</div>
    </div>

    <!-- Divider -->
    <div class="splash-divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-dot" style="opacity:0.5;width:4px;height:4px;"></div>
      <div class="divider-dot"></div>
      <div class="divider-line right"></div>
    </div>

    <!-- Location -->
    <div class="splash-location">Tema, Ghana</div>

    <!-- Loading dots -->
    <div class="splash-loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <span class="loader-text">Loading</span>
    </div>

  </div>

  <!-- Skip hint -->
  <div class="skip-hint">Tap to skip</div>

</div>

<script>
  // Floating dots in orange tones
  const splash = document.getElementById('splash');
  const colors = [
    'rgba(255,140,0,0.4)',
    'rgba(255,179,71,0.35)',
    'rgba(255,215,0,0.3)',
    'rgba(224,123,0,0.35)',
    'rgba(255,255,255,0.6)'
  ];

  for (let i = 0; i < 18; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const size = Math.random() * 8 + 3;
    dot.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 8 + 6}s;
      animation-delay: ${Math.random() * 4}s;
      filter: blur(${Math.random() > 0.5 ? '1px' : '0px'});
    `;
    splash.appendChild(dot);
  }

  // Dismiss
  let dismissed = false;

  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    splash.classList.add('exit');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 700);
  }

  setTimeout(dismiss, 4500);
  splash.addEventListener('click', dismiss);
</script>

</body>
</html>
