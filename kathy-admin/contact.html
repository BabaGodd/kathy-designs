<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kathy Designs - Contact Us</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <main class="contact-container">
    <h1>Contact Us</h1>
    <form id="contactForm" novalidate>
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Your full name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="Subject of your message" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>

      <button type="submit">Send Message</button>
      <p id="successMessage" style="display:none; color: green;">Message sent successfully!</p>
      <p id="errorMessage" style="display:none; color: red;">Failed to send message. Please try again.</p>
    </form>
  </main>

  <script src="contact.js"></script>
</body>
</html>
