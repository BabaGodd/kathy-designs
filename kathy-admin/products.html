<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Kathy Admin</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <i class="fas fa-crown"></i>
      <span>Kathy Admin</span>
    </div>
    <nav>
      <ul>
        <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
        <li class="active"><a href="products.html"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
        <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
        <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
        <li><a href="messages.html"><i class="fas fa-envelope"></i> <span>Messages</span></a></li>
        <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html"><i class="fas fa-store"></i> <span>View Store</span></a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">

    <!-- Top Bar -->
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <h1>Product Management</h1>
        <p class="admin-date" id="adminDate"></p>
      </div>
      <div class="admin-topbar-right">
        <div class="admin-avatar">
          <i class="fas fa-user-circle"></i>
          <span>Admin</span>
        </div>
      </div>
    </div>

    <!-- Filters & Add Button -->
    <div class="admin-section">
      <div class="products-toolbar">
        <div class="products-toolbar-left">
          <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchBar" placeholder="Search products...">
          </div>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="women">Women</option>
            <option value="men">Men</option>
            <option value="children">Children</option>
            <option value="bags-shoes">Bags & Shoes</option>
            <option value="fabrics">Fabrics</option>
            <option value="accessories">Accessories</option>
          </select>
          <select id="stockFilter">
            <option value="all">All Stock</option>
            <option value="in-stock">In Stock</option>
            <option value="low-stock">Low Stock</option>
            <option value="out-of-stock">Out of Stock</option>
          </select>
        </div>
        <button id="addProductBtn" class="admin-add-btn">
          <i class="fas fa-plus"></i> Add Product
        </button>
      </div>
    </div>

    <!-- Products Container — JS renders categories here -->
    <div id="productsContainer"></div>

  </main>

  <!-- ADD / EDIT PRODUCT MODAL -->
  <div class="admin-modal-overlay" id="productModalOverlay">
    <div class="admin-modal" id="productModal">
      <h2 id="modalTitle">Add New Product</h2>

      <form id="productForm">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="e.g. Floral Summer Dress" required>

        <label>Category</label>
        <select id="productCategory" required>
          <option value="women">Women</option>
          <option value="men">Men</option>
          <option value="bags-shoes">Bags & Shoes</option>
          <option value="fabrics">Fabrics</option>
          <option value="accessories">Accessories</option>
        </select>

        <label>Price (GHC)</label>
        <input type="number" id="productPrice" placeholder="e.g. 150" required step="0.01" min="0">

        <label>Stock Status</label>
        <select id="productStock" required>
          <option value="in-stock">In Stock</option>
          <option value="low-stock">Low Stock</option>
          <option value="out-of-stock">Out of Stock</option>
        </select>

        <label>Sizes (comma separated)</label>
        <input type="text" id="productSizes" placeholder="e.g. S, M, L, XL">

        <label>Colors (comma separated)</label>
        <input type="text" id="productColors" placeholder="e.g. Red, Blue, Black">

        <label>Image URL</label>
        <input type="text" id="productImage" placeholder="assets/image.jpg">

        <div class="admin-modal-buttons">
          <button type="submit">Save Product</button>
          <button type="button" id="cancelModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- QUICK VIEW MODAL -->
  <div class="admin-modal-overlay" id="quickViewOverlay">
    <div class="admin-modal" id="quickViewModal">
      <h2>Quick View</h2>
      <img id="qvImage" src="" alt="Product" style="width:100%; height:200px; object-fit:cover; border-radius:10px; margin-bottom:16px;">
      <h3 id="qvName" style="margin-bottom:6px;"></h3>
      <p id="qvPrice" style="color:#FF8C00; font-weight:700; font-size:1.1rem; margin-bottom:8px;"></p>
      <p id="qvStock" style="margin-bottom:6px;"></p>
      <p id="qvSizes" style="margin-bottom:6px; font-size:0.9rem; color:#555;"></p>
      <p id="qvColors" style="font-size:0.9rem; color:#555;"></p>
      <div class="admin-modal-buttons" style="margin-top:20px;">
        <button type="button" id="closeQuickView">Close</button>
      </div>
    </div>
  </div>

  <script src="products.js"></script>
</body>
</html>
